name: Update Badges

on:
  push:
    branches:
      - master
  schedule:
    - cron: '0 0 * * *'  # Run daily at midnight
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-badges:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Fetch GitHub Stats
        id: stats
        run: |
          cat << 'EOF' | sed 's/^          //' > fetch_stats.py
          import urllib.request
          import json
          import os

          headers = {'User-Agent': 'Mozilla/5.0'}
          
          # Fetch Stars
          try:
              req_repo = urllib.request.Request('https://api.github.com/repos/LeanBitLab/LtvLauncher', headers=headers)
              with urllib.request.urlopen(req_repo) as response:
                  repo_data = json.loads(response.read().decode())
                  stars = repo_data.get('stargazers_count', 0)
          except Exception as e:
              print(f'Error fetching stars: {e}')
              stars = 0

          # Fetch Releases & Downloads
          try:
              req_releases = urllib.request.Request('https://api.github.com/repos/LeanBitLab/LtvLauncher/releases', headers=headers)
              with urllib.request.urlopen(req_releases) as response:
                  releases_data = json.loads(response.read().decode())
                  version = releases_data[0].get('tag_name', 'unknown') if releases_data else 'unknown'
                  downloads = 0
                  for release in releases_data:
                      for asset in release.get('assets', []):
                          downloads += asset.get('download_count', 0)
          except Exception as e:
              print(f'Error fetching releases: {e}')
              version = 'unknown'
              downloads = 0

          def format_num(n):
              if n >= 1000000:
                  return f'{n/1000000:.1f}M'
              if n >= 1000:
                  return f'{n/1000:.1f}k'
              return str(n)

          stars_str = format_num(stars)
          downloads_str = format_num(downloads)

          github_output = os.environ.get('GITHUB_OUTPUT')
          if github_output:
              with open(github_output, 'a') as f:
                  f.write(f'stars={stars_str}\n')
                  f.write(f'version={version}\n')
                  f.write(f'downloads={downloads_str}\n')
          EOF
          python3 fetch_stats.py && rm fetch_stats.py

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install SQLite
        run: |
          sudo apt-get update
          sudo apt-get install -y sqlite3 libsqlite3-dev

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.5'

      - name: Install Dependencies
        run: flutter pub get

      - name: Generate Mocks
        run: flutter pub run build_runner build --delete-conflicting-outputs

      - name: Run Tests with Coverage and Reports
        run: |
          mkdir -p test-reports
          flutter test --coverage --file-reporter json:test-reports/results.json > test-reports/test_run.log || true

      - name: Calculate Coverage Percentage
        id: coverage
        run: |
          if [ -f coverage/lcov.info ]; then
            cat << 'EOF' | sed 's/^            //' > coverage.py
            import os
            lf = 0
            lh = 0
            with open('coverage/lcov.info') as f:
                for line in f:
                    if line.startswith('LF:'):
                        lf += int(line.split(':')[1])
                    elif line.startswith('LH:'):
                        lh += int(line.split(':')[1])
            print(f'{(lh/lf)*100:.1f}' if lf > 0 else '0.0')
            EOF
            PERCENTAGE=$(python3 coverage.py && rm coverage.py)
          else
            PERCENTAGE="0.0"
          fi
          echo "percent=$PERCENTAGE" >> $GITHUB_OUTPUT
          
          # Color logic based on percentage
          cat << 'EOF' | sed 's/^          //' > color.py
          import os
          p = float(os.environ.get('PERCENTAGE', '0.0'))
          if p >= 90:
              print('green')
          elif p >= 75:
              print('yellowgreen')
          elif p >= 50:
              print('yellow')
          else:
              print('red')
          EOF
          COLOR=$(python3 color.py && rm color.py)
          echo "color=$COLOR" >> $GITHUB_OUTPUT
        env:
          PERCENTAGE: ${{ steps.coverage.outputs.percent }}

      - name: Calculate Test Statistics
        id: test_stats
        run: |
          if [ -f test-reports/results.json ]; then
            cat << 'EOF' | sed 's/^            //' > stats.py
            import json
            import os
            success = 0
            failed = 0
            with open('test-reports/results.json') as f:
                for line in f:
                    try:
                        data = json.loads(line)
                        if data.get('type') == 'testDone':
                            if data.get('hidden', False):
                                continue
                            res = data.get('result')
                            if res == 'success':
                                success += 1
                            elif res in ('failure', 'error'):
                                failed += 1
                    except Exception:
                        pass
            total = success + failed
            if failed > 0:
                summary = f'{success}/{total} passed'
                color = 'red'
            else:
                summary = f'{success} passed'
                color = 'green'
            print(f'summary={summary}')
            print(f'color={color}')
            EOF
            python3 stats.py >> $GITHUB_OUTPUT && rm stats.py
          else
            echo "summary=no tests" >> $GITHUB_OUTPUT
            echo "color=grey" >> $GITHUB_OUTPUT
          fi

      - name: Create Version Badge
        uses: emibcn/badge-action@v2.0.2
        with:
          label: 'Version'
          status: '${{ steps.stats.outputs.version }}'
          color: '7C4DFF'
          path: '.github/badges/version.svg'

      - name: Create Downloads Badge
        uses: emibcn/badge-action@v2.0.2
        with:
          label: 'Downloads'
          status: '${{ steps.stats.outputs.downloads }}'
          color: '7C4DFF'
          path: '.github/badges/downloads.svg'

      - name: Create Stars Badge
        uses: emibcn/badge-action@v2.0.2
        with:
          label: 'Stars'
          status: '${{ steps.stats.outputs.stars }}'
          color: '7C4DFF'
          path: '.github/badges/stars.svg'

      - name: Create Coverage Badge
        uses: emibcn/badge-action@v2.0.2
        with:
          label: 'Coverage'
          status: '${{ steps.coverage.outputs.percent }}%'
          color: '${{ steps.coverage.outputs.color }}'
          path: '.github/badges/coverage.svg'

      - name: Create Tests Badge
        uses: emibcn/badge-action@v2.0.2
        with:
          label: 'Tests'
          status: '${{ steps.test_stats.outputs.summary }}'
          color: '${{ steps.test_stats.outputs.color }}'
          path: '.github/badges/tests.svg'

      - name: Commit and Push Badges
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: auto-update badges"
          file_pattern: ".github/badges/*.svg"
